<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>AudioControl — Listening Room</title>
<style>
  :root {
    --bg: #0d0e10;
    --panel: #16181b;
    --panel2: #1d2024;
    --line: #2a2e33;
    --grey: #3a3f46;
    --txt: #e9ebee;
    --txt2: #9aa0a8;
    --txt3: #6b7178;
    --cyan: #5EC8D8;
    --err: #e06b6b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--txt);
    font-family: -apple-system, system-ui, "SF Pro Text", sans-serif;
    min-height: 100dvh;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  /* Top bar */
  .bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 11px 18px; border-bottom: 1px solid var(--line);
    position: sticky; top: 0; background: var(--bg); z-index: 5;
  }
  .barleft { display: flex; align-items: center; gap: 14px; }
  .bar .t { font-size: 12.5px; font-weight: 600; letter-spacing: .5px; color: var(--txt2); }
  .barright { display: flex; align-items: center; gap: 14px; }
  .live { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--txt3); }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--grey); transition: background .3s, box-shadow .3s; }
  .dot.connected { background: var(--cyan); box-shadow: 0 0 8px var(--cyan); animation: pulse 2s ease-in-out infinite; }
  .dot.disconnected { background: var(--err); }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.45;} }

  .mutebtn, .reset {
    font-size: 11px; font-weight: 600; letter-spacing: .3px;
    padding: 7px 13px; border-radius: 9px; border: 1px solid var(--line);
    color: var(--txt2); background: var(--panel); cursor: pointer; white-space: nowrap;
    transition: border-color .15s, color .15s, background .15s;
  }
  .mutebtn.on { border-color: var(--err); color: #fff; background: var(--err); }
  .reset.armed { border-color: var(--err); color: var(--err); background: rgba(224,107,107,.08); }
  .reset.done  { border-color: var(--cyan); color: var(--cyan); }

  /* Card stack */
  .stack { max-width: 860px; margin: 0 auto; padding: 18px; display: flex; flex-direction: column; gap: 16px; }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 16px; padding: 16px 18px; }
  .card-h { display: flex; align-items: baseline; gap: 10px; margin-bottom: 14px; }
  .card-title { font-size: 13px; font-weight: 700; letter-spacing: .6px; text-transform: uppercase; color: var(--txt); }
  .card-tag { font-size: 10px; letter-spacing: .8px; text-transform: uppercase; color: var(--txt3); }

  /* Mains/Subs segmented toggle */
  .seg { display: flex; gap: 6px; background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 5px; }
  .segbtn {
    flex: 1; padding: 12px; border-radius: 8px; border: none; background: transparent;
    color: var(--txt2); font-size: 12.5px; font-weight: 700; letter-spacing: .6px;
    text-transform: uppercase; cursor: pointer; transition: background .15s, color .15s;
  }
  .segbtn.on { background: var(--cyan); color: #0d0e10; }

  .card-body { display: flex; gap: 26px; }
  .card-body .col { flex: 1; display: flex; flex-direction: column; gap: 18px; }
  .card-body.solo { display: block; }

  /* Control block */
  .lab { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--txt3); }
  .ctl .head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 11px; min-height: 22px; }

  .rowc { display: flex; align-items: center; gap: 13px; transition: opacity .15s; }
  .rowc.off { opacity: .35; pointer-events: none; }

  .btn {
    flex: none; width: 50px; height: 50px; border-radius: 14px;
    background: var(--panel2); border: 1px solid var(--line);
    color: var(--txt); font-size: 24px; font-weight: 600;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: pointer; line-height: 1; transition: border-color .1s, color .1s;
  }
  .btn:active { border-color: var(--cyan); color: var(--cyan); }
  .btn span { font-size: 8px; color: var(--txt3); letter-spacing: .4px; margin-top: 2px; }

  /* Center value (tappable to type) */
  .valmid { flex: 1; text-align: center; border-radius: 10px; cursor: pointer; padding: 4px 0; }
  .valmid b { font-size: 26px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .valmid small { font-size: 12px; color: var(--txt3); }
  .valmid.pos b { color: var(--cyan); }
  .valmid:active { background: var(--panel2); }
  input.edit {
    width: 4.6em; font-family: inherit; font-size: 24px; font-weight: 700; text-align: center;
    background: var(--panel2); color: var(--cyan); border: 1px solid var(--cyan);
    border-radius: 9px; padding: 3px 4px; -webkit-appearance: none; -moz-appearance: textfield;
  }
  input.edit::-webkit-outer-spin-button, input.edit::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

  /* Draggable level bar (landscape only) — relative, half-sensitivity drag */
  .levelbar {
    position: relative; height: 16px; background: var(--grey); border-radius: 9px;
    margin-top: 16px; touch-action: none; cursor: grab;
  }
  .levelbar:active { cursor: grabbing; }
  .lfill { position: absolute; left: 0; top: 0; bottom: 0; width: 0; background: var(--cyan); border-radius: 9px; }
  .lknob {
    position: absolute; top: 50%; left: 0; transform: translateY(-50%);
    width: 22px; height: 22px; border-radius: 50%; background: var(--txt);
    border: 4px solid var(--bg); box-shadow: 0 2px 6px rgba(0,0,0,.5);
  }

  /* Bypass switch */
  .swwrap { display: flex; align-items: center; gap: 8px; }
  .swwrap .st { font-size: 9.5px; letter-spacing: .5px; text-transform: uppercase; color: var(--txt3); width: 62px; text-align: right; }
  .sw { width: 42px; height: 24px; border-radius: 14px; background: var(--grey); position: relative; cursor: pointer; flex: none; transition: background .15s; }
  .sw.on { background: var(--cyan); }
  .sw::after { content: ""; position: absolute; top: 3px; left: 3px; width: 18px; height: 18px; border-radius: 50%; background: #fff; transition: left .15s; }
  .sw.on::after { left: 21px; }

  /* Curve box */
  .curvebox { background: var(--bg); border: 1px solid var(--line); border-radius: 12px; padding: 12px 14px 8px; }
  .clab { display: flex; justify-content: space-between; font-size: 9.5px; color: var(--txt3); letter-spacing: .5px; margin-bottom: 4px; }
  svg { display: block; width: 100%; height: auto; }
  .axis { display: flex; justify-content: space-between; font-size: 9px; color: var(--txt3); margin-top: 3px; padding: 0 2px; }

  /* Portrait: stack columns, buttons-only (hide level bars) */
  @media (orientation: portrait) {
    .card-body { flex-direction: column; gap: 16px; }
    .levelbar { display: none; }
    .stack { padding: 12px; gap: 12px; }
  }
</style>
</head>
<body>

  <div class="bar">
    <div class="barleft">
      <span class="t">LISTENING ROOM</span>
      <button class="mutebtn" id="muteBtn">Mute</button>
    </div>
    <div class="barright">
      <button class="reset" id="reset">&#8634; Reset</button>
      <span class="live"><span class="dot" id="dot"></span><span id="connLabel">connecting…</span></span>
    </div>
  </div>

  <div class="stack">
    <section class="card">
      <div class="card-h"><span class="card-title">Master</span><span class="card-tag">volume</span></div>
      <div class="card-body solo">
        <div class="ctl">
          <div class="rowc">
            <button class="btn" id="masterMinus">&minus;<span>1 dB</span></button>
            <div class="valmid val tap" id="masterVal"></div>
            <button class="btn" id="masterPlus">+<span>1 dB</span></button>
          </div>
          <div class="levelbar" id="masterBar"><div class="lfill" id="masterFill"></div><div class="lknob" id="masterKnob"></div></div>
        </div>
      </div>
    </section>
    <div class="seg">
      <button class="segbtn" data-g="mains">Main Speakers</button>
      <button class="segbtn" data-g="subs">Subwoofers</button>
    </div>
    <div id="groups"></div>
  </div>

<script>
(function () {
  'use strict';

  var MASTER = [-60, -25, 1];
  var GAINR  = [-24, 12, 0.5];
  var HPFR   = [20, 400, 5];
  var LPFR   = [40, 500, 5];
  var GAP    = 10;
  var GROUPS = [
    { key: 'mains', title: 'Main Speakers', tag: 'L / R' },
    { key: 'subs',  title: 'Subwoofers',    tag: 'L / R' }
  ];

  var state = null;
  var active = 'subs';   // which group's card is in view
  var DRAG_SENS = 0.5;   // value moves at half the speed of the finger

  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
  function fmtdB(v) { return (v > 0 ? '+' : (v < 0 ? '−' : '')) + Math.abs(v).toFixed(1); }
  function valHTML(txt, unit) { return '<b>' + txt + '</b><small> ' + unit + '</small>'; }
  function xOf(f) { return Math.log(f / 20) / Math.log(32) * 300; }
  function yOf(dB) { return 18 + clamp(-dB, 0, 30) * 3; }
  function dBat(ch, f) {
    var d = 0;
    if (!ch.hpf.bypass) d += -10 * Math.log10(1 + Math.pow(ch.hpf.freq / f, 8));
    if (!ch.lpf.bypass) d += -10 * Math.log10(1 + Math.pow(f / ch.lpf.freq, 8));
    return d;
  }

  // ── build group cards ───────────────────────────────────────────────────────
  function cardHTML(g) {
    var k = g.key;
    function filterCtl(which, label) {
      return '<div class="ctl">'
        + '<div class="head"><span class="lab">' + label + '</span>'
        + '<div class="swwrap"><span class="st" id="' + k + '-' + which + 'St"></span>'
        + '<div class="sw" id="' + k + '-' + which + 'Sw"></div></div></div>'
        + '<div class="rowc" id="' + k + '-' + which + 'Row">'
        + '<button class="btn" id="' + k + '-' + which + 'Minus">&minus;<span>5 Hz</span></button>'
        + '<div class="valmid tap" id="' + k + '-' + which + 'Val"></div>'
        + '<button class="btn" id="' + k + '-' + which + 'Plus">+<span>5 Hz</span></button>'
        + '</div></div>';
    }
    return '<section class="card" id="card-' + k + '">'
      + '<div class="card-h"><span class="card-title">' + g.title + '</span><span class="card-tag">' + g.tag + '</span></div>'
      + '<div class="card-body"><div class="col">'
      + '<div class="ctl"><div class="head"><span class="lab">Gain</span></div>'
      + '<div class="rowc">'
      + '<button class="btn" id="' + k + '-gainMinus">&minus;<span>0.5</span></button>'
      + '<div class="valmid val tap" id="' + k + '-gainVal"></div>'
      + '<button class="btn" id="' + k + '-gainPlus">+<span>0.5</span></button>'
      + '</div><div class="levelbar" id="' + k + '-gainBar"><div class="lfill" id="' + k + '-gainFill"></div><div class="lknob" id="' + k + '-gainKnob"></div></div></div>'
      + '</div><div class="col">'
      + filterCtl('hpf', 'High-Pass')
      + filterCtl('lpf', 'Low-Pass')
      + '<div class="curvebox"><div class="clab"><span>PASSBAND</span><span>24 dB/oct · LR4</span></div>'
      + '<svg viewBox="0 0 300 120" preserveAspectRatio="none">'
      + '<line x1="0" y1="18" x2="300" y2="18" stroke="#2a2e33" stroke-width="1"/>'
      + '<line x1="0" y1="63" x2="300" y2="63" stroke="#23262b" stroke-width="1"/>'
      + '<line x1="0" y1="108" x2="300" y2="108" stroke="#23262b" stroke-width="1"/>'
      + '<line id="' + k + '-hpfLine" y1="12" y2="112" stroke="#5EC8D8" stroke-width="1" stroke-dasharray="3 3" opacity=".45"/>'
      + '<line id="' + k + '-lpfLine" y1="12" y2="112" stroke="#5EC8D8" stroke-width="1" stroke-dasharray="3 3" opacity=".45"/>'
      + '<path id="' + k + '-curveFill" fill="#5EC8D8" opacity=".10"/>'
      + '<path id="' + k + '-curve" fill="none" stroke="#5EC8D8" stroke-width="2.4" stroke-linejoin="round"/>'
      + '<circle id="' + k + '-hpfDot" r="4.5" fill="#0d0e10" stroke="#5EC8D8" stroke-width="2.4"/>'
      + '<circle id="' + k + '-lpfDot" r="4.5" fill="#0d0e10" stroke="#5EC8D8" stroke-width="2.4"/>'
      + '</svg><div class="axis"><span>20</span><span>40</span><span>80</span><span>160</span><span>320</span><span>640 Hz</span></div>'
      + '</div></div></div></section>';
  }

  function buildCards() {
    document.getElementById('groups').innerHTML = GROUPS.map(cardHTML).join('');
  }

  function setActive(k) {
    active = k;
    try { localStorage.setItem('ac_active', k); } catch (e) {}
    GROUPS.forEach(function (g) {
      document.getElementById('card-' + g.key).style.display = (g.key === k) ? '' : 'none';
      var b = document.querySelector('.segbtn[data-g="' + g.key + '"]');
      if (b) b.className = 'segbtn' + (g.key === k ? ' on' : '');
    });
  }

  // ── API ─────────────────────────────────────────────────────────────────────
  async function api(method, path, body) {
    try {
      var opts = { method: method, headers: { 'Content-Type': 'application/json' } };
      if (body !== undefined) opts.body = JSON.stringify(body);
      var r = await fetch('/api' + path, opts);
      if (r.ok) state = await r.json();
    } catch (e) { /* keep last good state */ }
    render();
    return state;
  }

  // ── health ──────────────────────────────────────────────────────────────────
  function setConnected(ok) {
    document.getElementById('dot').className = 'dot ' + (ok ? 'connected' : 'disconnected');
    document.getElementById('connLabel').textContent = ok ? 'minidsp connected' : 'disconnected';
  }
  async function pollHealth() {
    try { var h = await (await fetch('/api/health')).json(); setConnected(h.status === 'ok'); }
    catch (e) { setConnected(false); }
  }

  // ── render ──────────────────────────────────────────────────────────────────
  function paint(prefix, frac) {
    frac = clamp(frac, 0, 1);
    document.getElementById(prefix + 'Fill').style.width = (frac * 100) + '%';
    var kn = document.getElementById(prefix + 'Knob');
    if (kn) kn.style.left = 'calc(' + (frac * 100) + '% - 11px)';
  }

  function render() {
    if (!state) return;
    var mb = document.getElementById('muteBtn');
    mb.className = 'mutebtn' + (state.mute ? ' on' : '');
    mb.textContent = state.mute ? 'Muted' : 'Mute';

    document.getElementById('masterVal').innerHTML = valHTML(fmtdB(state.master_gain), 'dB');
    paint('master', (state.master_gain - MASTER[0]) / (MASTER[1] - MASTER[0]));

    GROUPS.forEach(function (g) {
      var ch = state[g.key], k = g.key;
      var gv = document.getElementById(k + '-gainVal');
      gv.innerHTML = valHTML(fmtdB(ch.gain), 'dB');
      gv.className = 'valmid val tap' + (ch.gain > 0 ? ' pos' : '');
      paint(k + '-gain', (ch.gain - GAINR[0]) / (GAINR[1] - GAINR[0]));
      renderFilter(k, 'hpf', ch.hpf);
      renderFilter(k, 'lpf', ch.lpf);
      drawCurve(k, ch);
    });
  }

  function renderFilter(k, which, fs) {
    var on = !fs.bypass;
    document.getElementById(k + '-' + which + 'Val').innerHTML = valHTML(fs.freq, 'Hz');
    document.getElementById(k + '-' + which + 'Sw').className = 'sw' + (on ? ' on' : '');
    document.getElementById(k + '-' + which + 'St').textContent = on ? 'engaged' : 'bypassed';
    document.getElementById(k + '-' + which + 'Row').className = 'rowc' + (on ? '' : ' off');
  }

  function drawCurve(k, ch) {
    var N = 160, line = '';
    for (var i = 0; i <= N; i++) {
      var frac = i / N, f = 20 * Math.pow(32, frac);
      line += (i === 0 ? 'M' : ' L') + (frac * 300).toFixed(1) + ',' + yOf(dBat(ch, f)).toFixed(1);
    }
    document.getElementById(k + '-curve').setAttribute('d', line);
    document.getElementById(k + '-curveFill').setAttribute('d', line + ' L300,120 L0,120 Z');
    marker(k, 'hpf', ch.hpf, ch);
    marker(k, 'lpf', ch.lpf, ch);
  }

  function marker(k, which, fs, ch) {
    var x = xOf(fs.freq), y = yOf(dBat(ch, fs.freq)), on = !fs.bypass;
    var dot = document.getElementById(k + '-' + which + 'Dot');
    var ln = document.getElementById(k + '-' + which + 'Line');
    dot.setAttribute('cx', x.toFixed(1)); dot.setAttribute('cy', y.toFixed(1));
    ln.setAttribute('x1', x.toFixed(1)); ln.setAttribute('x2', x.toFixed(1));
    dot.style.display = on ? '' : 'none';
    ln.style.opacity = on ? '.45' : '.12';
  }

  // ── tap-to-type editing ───────────────────────────────────────────────────────
  function editable(id, getValue, commit) {
    var el = document.getElementById(id);
    el.addEventListener('click', function () {
      if (el.querySelector('input')) return;
      el.innerHTML = '<input class="edit" type="number" inputmode="decimal" step="any" value="' + getValue() + '">';
      var inp = el.querySelector('input');
      inp.focus(); inp.select();
      var done = false;
      function finish(ok) {
        if (done) return; done = true;
        var v = parseFloat(inp.value);
        if (ok && !isNaN(v)) commit(v); else render();
      }
      inp.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') { e.preventDefault(); finish(true); }
        else if (e.key === 'Escape') { e.preventDefault(); finish(false); }
      });
      inp.addEventListener('blur', function () { finish(true); });
    });
  }

  // ── relative, half-sensitivity drag (landscape gain bars) ─────────────────────
  function attachDrag(prefix, range, getValue, commit) {
    var rail = document.getElementById(prefix + 'Bar');
    var dragging = false, moved = false, startX = 0, startVal = 0, curVal = 0;
    rail.addEventListener('pointerdown', function (e) {
      dragging = true; moved = false; startX = e.clientX;
      startVal = getValue(); curVal = startVal;
      rail.setPointerCapture(e.pointerId);
    });
    rail.addEventListener('pointermove', function (e) {
      if (!dragging) return;
      moved = true;
      var w = rail.getBoundingClientRect().width || 1;
      // value moves at half the finger's proportional travel (no jump-to-touch)
      var raw = startVal + ((e.clientX - startX) / w) * (range[1] - range[0]) * DRAG_SENS;
      curVal = clamp(Math.round(raw / range[2]) * range[2], range[0], range[1]);
      paint(prefix, (curVal - range[0]) / (range[1] - range[0]));
      var vel = document.getElementById(prefix + 'Val');
      if (vel) vel.innerHTML = valHTML(fmtdB(curVal), 'dB');
    });
    function end() {
      if (!dragging) return;
      dragging = false;
      if (moved) commit(curVal); else render();
    }
    rail.addEventListener('pointerup', end);
    rail.addEventListener('pointercancel', function () { dragging = false; render(); });
  }

  // ── steppers / toggles ────────────────────────────────────────────────────────
  function nudgeMaster(d) {
    api('POST', '/master-gain', { value: clamp(Math.round(state.master_gain + d), MASTER[0], MASTER[1]) });
  }
  function nudgeGain(k, d) {
    var v = clamp(Math.round((state[k].gain + d) / 0.5) * 0.5, GAINR[0], GAINR[1]);
    api('POST', '/' + k + '/gain', { value: v });
  }
  function nudgeHpf(k, d) {
    var max = state[k].lpf.freq - GAP;
    api('POST', '/' + k + '/hpf', { freq: clamp(Math.round((state[k].hpf.freq + d) / 5) * 5, HPFR[0], max) });
  }
  function nudgeLpf(k, d) {
    var min = state[k].hpf.freq + GAP;
    api('POST', '/' + k + '/lpf', { freq: clamp(Math.round((state[k].lpf.freq + d) / 5) * 5, min, LPFR[1]) });
  }
  function toggleFilter(k, which) {
    api('POST', '/' + k + '/' + which, { bypass: !state[k][which].bypass });
  }
  function toggleMute() { api('POST', '/mute', { value: !state.mute }); }

  // ── reset two-tap ─────────────────────────────────────────────────────────────
  var resetArmed = false, resetTimer = null, RESET_LABEL = '&#8634; Reset';
  function handleReset() {
    var btn = document.getElementById('reset');
    if (!resetArmed) {
      resetArmed = true; btn.classList.add('armed'); btn.textContent = 'Tap again';
      resetTimer = setTimeout(function () { resetArmed = false; btn.classList.remove('armed'); btn.innerHTML = RESET_LABEL; }, 3000);
    } else {
      clearTimeout(resetTimer); resetArmed = false; btn.classList.remove('armed');
      api('POST', '/reset');
      btn.classList.add('done'); btn.textContent = 'Reset ✓';
      setTimeout(function () { btn.classList.remove('done'); btn.innerHTML = RESET_LABEL; }, 1200);
    }
  }

  // ── wire up ───────────────────────────────────────────────────────────────────
  function wireUp() {
    document.getElementById('muteBtn').addEventListener('click', toggleMute);
    document.getElementById('reset').addEventListener('click', handleReset);
    Array.prototype.forEach.call(document.querySelectorAll('.segbtn'), function (b) {
      b.addEventListener('click', function () { setActive(b.getAttribute('data-g')); });
    });
    document.getElementById('masterMinus').addEventListener('click', function () { nudgeMaster(-1); });
    document.getElementById('masterPlus').addEventListener('click', function () { nudgeMaster(1); });
    editable('masterVal', function () { return state.master_gain; }, function (v) { api('POST', '/master-gain', { value: v }); });
    attachDrag('master', MASTER, function () { return state.master_gain; }, function (v) { api('POST', '/master-gain', { value: v }); });

    GROUPS.forEach(function (g) {
      var k = g.key;
      document.getElementById(k + '-gainMinus').addEventListener('click', function () { nudgeGain(k, -0.5); });
      document.getElementById(k + '-gainPlus').addEventListener('click', function () { nudgeGain(k, 0.5); });
      document.getElementById(k + '-hpfMinus').addEventListener('click', function () { nudgeHpf(k, -5); });
      document.getElementById(k + '-hpfPlus').addEventListener('click', function () { nudgeHpf(k, 5); });
      document.getElementById(k + '-lpfMinus').addEventListener('click', function () { nudgeLpf(k, -5); });
      document.getElementById(k + '-lpfPlus').addEventListener('click', function () { nudgeLpf(k, 5); });
      document.getElementById(k + '-hpfSw').addEventListener('click', function () { toggleFilter(k, 'hpf'); });
      document.getElementById(k + '-lpfSw').addEventListener('click', function () { toggleFilter(k, 'lpf'); });
      editable(k + '-gainVal', function () { return state[k].gain; }, function (v) { api('POST', '/' + k + '/gain', { value: v }); });
      attachDrag(k + '-gain', GAINR, function () { return state[k].gain; }, function (v) { api('POST', '/' + k + '/gain', { value: v }); });
      editable(k + '-hpfVal', function () { return state[k].hpf.freq; }, function (v) { api('POST', '/' + k + '/hpf', { freq: Math.round(v) }); });
      editable(k + '-lpfVal', function () { return state[k].lpf.freq; }, function (v) { api('POST', '/' + k + '/lpf', { freq: Math.round(v) }); });
    });
  }

  async function init() {
    buildCards();
    wireUp();
    var saved = null;
    try { saved = localStorage.getItem('ac_active'); } catch (e) {}
    setActive(saved === 'mains' || saved === 'subs' ? saved : active);
    await api('GET', '/state');
    await pollHealth();
    setInterval(pollHealth, 5000);
  }

  document.addEventListener('DOMContentLoaded', init);
})();
</script>
</body>
</html>
